name: Deploy to Firebase + Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: dee-eppn-plataforma
  REGION: europe-west1
  SERVICE_NAME: aeppn-backend
  AR_REPO: aeppn

jobs:
  # ---------- BACKEND ----------
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} \
            --location=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            || gcloud artifacts repositories create ${{ env.AR_REPO }} \
                 --repository-format=docker \
                 --location=${{ env.REGION }} \
                 --project=${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push backend image
        run: |
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMG" ./backend
          docker push "$IMG"
          echo "IMG=$IMG" >> $GITHUB_ENV

      - id: deploy
        name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMG" \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --service-account aeppn-deploy-290@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }},JWT_SECRET=${{ secrets.JWT_SECRET }},ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }},ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }},EMERGENT_LLM_KEY=${{ secrets.EMERGENT_LLM_KEY }},APP_NAME=aeppn-dee,FRONTEND_URL=https://${{ env.PROJECT_ID }}.web.app
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Cloud Run URL: $URL"

  # ---------- FRONTEND ----------
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ needs.deploy-backend.outputs.url }}
        run: yarn build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Firebase Hosting + Firestore rules
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ env.PROJECT_ID }}
          channelId: live
